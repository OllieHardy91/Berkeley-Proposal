<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071029"/>
      <stop offset="100%" stop-color="#0e1f4d"/>
    </linearGradient>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00a6d7"/>
      <stop offset="100%" stop-color="#30e7ed"/>
    </linearGradient>
    <radialGradient id="rg" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#00a6d7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00a6d7" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="360" height="160" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <g fill="rgba(255,255,255,0.05)">
    <circle cx="30"  cy="20"  r="1.5"/><circle cx="60"  cy="20"  r="1.5"/><circle cx="90"  cy="20"  r="1.5"/><circle cx="120" cy="20"  r="1.5"/>
    <circle cx="240" cy="20"  r="1.5"/><circle cx="270" cy="20"  r="1.5"/><circle cx="300" cy="20"  r="1.5"/><circle cx="330" cy="20"  r="1.5"/>
    <circle cx="30"  cy="50"  r="1.5"/><circle cx="60"  cy="50"  r="1.5"/><circle cx="300" cy="50"  r="1.5"/><circle cx="330" cy="50"  r="1.5"/>
    <circle cx="30"  cy="80"  r="1.5"/><circle cx="300" cy="80"  r="1.5"/><circle cx="330" cy="80"  r="1.5"/>
    <circle cx="30"  cy="110" r="1.5"/><circle cx="60"  cy="110" r="1.5"/><circle cx="300" cy="110" r="1.5"/><circle cx="330" cy="110" r="1.5"/>
    <circle cx="30"  cy="140" r="1.5"/><circle cx="60"  cy="140" r="1.5"/><circle cx="90"  cy="140" r="1.5"/><circle cx="120" cy="140" r="1.5"/>
    <circle cx="240" cy="140" r="1.5"/><circle cx="270" cy="140" r="1.5"/><circle cx="300" cy="140" r="1.5"/><circle cx="330" cy="140" r="1.5"/>
  </g>

  <!-- Radial glow behind symbol -->
  <ellipse cx="180" cy="78" rx="90" ry="52" fill="url(#rg)"/>

  <!-- ∞ glow layer (blurred duplicate) -->
  <text x="180" y="100"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="76"
    fill="#00c5e5"
    text-anchor="middle"
    filter="url(#glow)"
    opacity="0.45">∞</text>

  <!-- ∞ main symbol -->
  <text x="180" y="100"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="76"
    fill="url(#cg)"
    text-anchor="middle"
    opacity="0.96">∞</text>

  <!-- Status indicator dots -->
  <circle cx="158" cy="126" r="3.5" fill="#4ade80" opacity="0.85"/>
  <text x="166" y="130" font-family="system-ui, sans-serif" font-size="8" fill="rgba(255,255,255,0.45)">Live</text>

  <!-- Label -->
  <text x="180" y="150"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="7.5"
    font-weight="700"
    letter-spacing="3"
    fill="rgba(255,255,255,0.28)"
    text-anchor="middle">NO EXPIRY · NO RENEWAL</text>
</svg>
